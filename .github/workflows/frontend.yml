name: Frontend

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  scss:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint SCSS
        run: npm run lint:scss

      - name: Build CSS
        run: npm run build:css:prod

      - name: Check generated CSS is committed
        run: |
          git diff --exit-code -- htdocs/luci-static/smart/css/style.css
